name: openwrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      name:
        description: 'дё»жңәеҗҚз§°'
        required: true
        default: 'MI-R3G'
        type: choice
        options:
        - MI-R3G
        - OpenWrt

      ENABLE_Cache:
        description: 'зј“еӯҳеҠ йҖҹ'     
        required: false
        default: 'true'
        type: boolean 
        
      OP_IP:
        description: 'йқҷжҖҒIPең°еқҖ'     
        required: false
        default: '192.168.2.1' 
        type: string

   
      OP_author:
        description: 'е®ҡеҲ¶дҪңиҖ…'     
        required: false
        default: 'shiyu1314' 
        type: string    

      CUSTOM_PLUGINS:
        description: 'иҮӘе®ҡд№үжҸ’д»¶еҗҚз§°пјҢз”Ёз©әж јеҲҶйҡ”'
        required: false
        default: 'luci-theme-argon luci-app-ttyd luci-app-turboacc'
        type: string

env:
  DIY_P1_SH: sh/op.sh

jobs:
  build_firmware:
    name: зј–иҜ‘еӣәд»¶
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        repo_info:
          - {branch: "openwrt-23.05"}

    steps: 
    - name: жЈҖжҹҘеҲҶж”Ҝ
      uses: actions/checkout@main

    - name: зј–иҜ‘зҺҜеўғ
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y tar build-essential flex bison cmake g++ gawk gcc-multilib g++-multilib gettext git libfuse-dev libncurses5-dev libssl-dev python3 python3-pip python3-ply python3-distutils python3-pyelftools rsync unzip zlib1g-dev file wget subversion patch upx-ucl autoconf automake curl asciidoc binutils bzip2 lib32gcc-s1 libc6-dev-i386 uglifyjs msmtp texinfo libreadline-dev libglib2.0-dev xmlto libelf-dev libtool autopoint antlr3 gperf ccache swig coreutils haveged scons libpython3-dev rename qemu-utils
        sudo apt-get clean
        git config --global user.name 'GitHub Actions' && git config --global user.email 'noreply@github.com'
        sudo timedatectl set-timezone 'Asia/Shanghai'
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        df -Th

    - name: и®ҫзҪ®зҺҜеўғеҸҳйҮҸ
      run: |
        TAG="$(date +'%Y%m%d')-$(openssl rand -hex 3)"
        echo "tag=$TAG" >> $GITHUB_ENV
        echo "REPO_URL=https://github.com/openwrt/openwrt" >> $GITHUB_ENV
        echo "REPO_BRANCH=${{ matrix.repo_info.branch }}" >> $GITHUB_ENV
        echo "OP_IP=${{ github.event.inputs.OP_IP }}" >> $GITHUB_ENV
        echo "OP_author=${{ github.event.inputs.OP_author }}" >> $GITHUB_ENV
        echo "CUSTOM_PLUGINS=${{ github.event.inputs.CUSTOM_PLUGINS }}" >> $GITHUB_ENV
        echo "name=${{ github.event.inputs.name }}" >> $GITHUB_ENV
        echo "ENABLE_Cache=${{ github.event.inputs.ENABLE_Cache }}" >> $GITHUB_ENV

    - name: е…ӢйҡҶжәҗд»Јз Ғ
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
    - name: еҲҮжҚў23.05
      working-directory: ./openwrt
      id: var
      run: |
        case $REPO_BRANCH in
          openwrt-23.05)
            _release_tag=$(git tag --sort=taggerdate --list 'v23.05.4' | tail -1)
            git checkout $_release_tag
            _prerelease=false
            ;;
          *)
            echo "Can't get local/upstream's branch/tags"
            ;;
        esac
        echo "release_tag=$_release_tag" >> $GITHUB_ENV
        if [[ "${{ github.event.inputs.ENABLE_Cache }}" == "true" ]]; then
          git clone -b sd --depth 1 --single-branch https://github.com/shiyu1314/r3g staging_dir
        fi
        ls

        
    - name: еҠ иҪҪиҮӘе®ҡд№үи„ҡжң¬
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        

    - name: еҠ иҪҪиҮӘе®ҡд№үй…ҚзҪ®
      run: |
        [ -e files ] && mv files openwrt/files
        cat <<EOF >>openwrt/.config
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-3g=y
        # CONFIG_PACKAGE_dnsmasq is not set

        CONFIG_PACKAGE_dnsmasq-full=y
        CONFIG_PACKAGE_luci-app-firewall=y
        CONFIG_PACKAGE_ethtool=y
        CONFIG_PACKAGE_iptables-nft=y
        CONFIG_PACKAGE_kmod-tcp-brutal=y
        CONFIG_PACKAGE_my-default-settings=y
        EOF
        
        IFS=' ' read -r -a plugins <<< "${{ github.event.inputs.CUSTOM_PLUGINS }}"
        for plugin in "${plugins[@]}"; do
          echo "CONFIG_PACKAGE_${plugin}=y" >> openwrt/.config
        done    
    
    - name: дёӢиҪҪзј–иҜ‘дҫқиө–
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
    
    - name: зј–иҜ‘жәҗз Ғ
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: жҹҘзңӢзЈҒзӣҳдҪҝз”Ёжғ…еҶө
      if: (!cancelled())
      run: df -hT

    - name: ж•ҙзҗҶж–Үд»¶
      id: organize
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        rm -rf *.buildinfo
        rm -rf profiles.json
        rm -rf *.manifest
        rm -rf *.sha
        rm -rf sha256sums
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: дёҠдј еӣәд»¶еҲ°Releases
      uses: softprops/action-gh-release@v2.1.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ matrix.repo_info.branch }}-${{env.tag}}
        files: ${{ env.FIRMWARE }}/*
        body: |
          ====================еӣәд»¶дҝЎжҒҜ=======================
           жәҗз Ғпјҡ${{ matrix.repo_info.repo_url }}
           еҲҶж”Ҝпјҡ${{ matrix.repo_info.branch }}
           йқҷжҖҒIPпјҡ${{ github.event.inputs.OP_IP }}
           жҸ’д»¶пјҡ${{ github.event.inputs.CUSTOM_PLUGINS }}
           е®ҡеҲ¶дҪңиҖ…пјҡ${{ github.event.inputs.OP_author }}
           й»ҳи®ӨеҜҶз Ғпјҡж— 
        
    - name: жё…зҗҶReleases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 2
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
